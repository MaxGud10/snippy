# RUN: llvm-snippy %s -march=riscv64-linux-gnu -mattr=+v \
# RUN:  --num-instrs=1000 -o %t \
# RUN:  -model-plugin=None --init-regs-in-elf \
# RUN:  -riscv-dump-rvv-config

include:
- rvv-config-biased/Inputs/rvv-unit-sew64-lmulX.yaml

sections:
  - name:      0
    VMA:       0x100000
    SIZE:      0x400000
    LMA:       0x100000
    ACCESS:    r
  - name:      1
    VMA:       0x80000000
    SIZE:      0x400000
    LMA:       0x80000000
    ACCESS:    rx
  - name:      2
    VMA:       0x80600000
    SIZE:      0x400000
    LMA:       0x80600000
    ACCESS:    rw
histogram:
    - [VADD_VV, 1.0]
