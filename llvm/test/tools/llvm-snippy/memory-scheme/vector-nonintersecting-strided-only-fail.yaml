# COM: Check that using riscv-disallow-intersecting-mem-accesses requests number of elements > 1.
# COM: This is done by specifying a VL larger than the scheme can accommodate. Without the option
# COM: the generated stride is always zero.
#
# RUN: llvm-snippy %s -model-plugin None
# RUN: not llvm-snippy %s -riscv-disallow-intersecting-mem-accesses="VSSE8_V" -model-plugin None |& FileCheck %s
#
# CHECK: Memory schemes are to restrictive to generate access (size: 1, alignment: 1, stride: 1, number of elements: 4)
options:
  mtriple: riscv64
  mattr: +v
  num-instrs: 10000
  init-regs-in-elf: true
  verify-mi: true
sections:
  - no: 1
    VMA: 0x80000000
    SIZE: 0x00400000
    LMA: 0x80000000
    ACCESS: rx
  - no: 2
    VMA: 0x80600000
    SIZE: 0x00400000
    LMA: 0x80600000
    ACCESS: r
  - no: 3
    VMA: 0x81000000
    SIZE: 0x00400000
    LMA: 0x81000000
    ACCESS: rw
access-ranges:
  - start: 0x81000000
    size: 0x3
    stride: 1
    first-offset: 0
    last-offset: 0
riscv-vector-unit:
  mode-change-bias:
    P: 0.2
  mode-distribution:
    VM:
      - [all_ones, 1.0]
    VL:
      - [4, 1.0]
    VXRM:
      rnu: 1.0
      rne: 1.0
      rdn: 1.0
      ron: 1.0
    VTYPE:
      SEW:
        sew_8: 1.0
      LMUL:
        m1: 1.0
      VMA:
        mu: 1.0
        ma: 1.0
      VTA:
        tu: 1.0
        ta: 1.0
histogram:
  - ["VSSE8_V", 1.0]
