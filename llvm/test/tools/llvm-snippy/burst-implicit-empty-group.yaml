# RUN: llvm-snippy %s -seed=1 -model-plugin=None |& FileCheck %s

options:
    mtriple: riscv64-unknown-elf
    mattr: +v
    dump-mf: on
    num-instrs: 100


sections:
    - name:      1
      VMA:       0x80000000
      SIZE:      0x400000
      LMA:       0x80000000
      ACCESS:    rx
    - name:      2
      VMA:       0x90000000
      SIZE:      0x400000
      LMA:       0x90000000
      ACCESS:    rw
    - name:      3
      VMA:       0x70000000
      SIZE:      0x400000
      LMA:       0x70000000
      ACCESS:    r

histogram:
    - [VSETVL, 1.0]
    - [VSETIVLI, 1.0]
    - [VLSE32_V, 1.0]
    - [VSSE32_V, 1.0]
    - [VLSSEG6E8_V, 1.0]

burst:
    mode: custom
    min-size: 4
    max-size: 16
    groupings:
      - [VSETVL, VSETIVLI]
      - [VLSE32_V, VSSE32_V]

# CHECK: warning: (burst-mode) Opcode VSETIVLI is not supported in the
# CHECK-SAME: burst mode: generator will generate it but not in a burst group.
# CHECK-NEXT: warning: (burst-mode) Opcode VSETVL is not supported in the
# CHECK-SAME: burst mode: generator will generate it but not in a burst group.
# CHECK-NEXT: warning: (burst-mode) Empty burst group: no supported opcodes were
# CHECK-SAME: specified, this group will be ignored.

# CHECK: warning: (burst-mode) Opcode VLSE32_V is not supported in the
# CHECK-SAME: burst mode: generator will generate it but not in a burst group.
# CHECK-NEXT: warning: (burst-mode) Opcode VSSE32_V is not supported in the
# CHECK-SAME: burst mode: generator will generate it but not in a burst group.
# CHECK-NEXT: warning: (burst-mode) Empty burst group: no supported opcodes were
# CHECK-SAME: specified, this group will be ignored.

# CHECK: VSETVL
# CHECK: VSETIVLI

# CHECK: VSSE32_V
# CHECK: VLSE32_V
