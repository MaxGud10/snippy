options:
  march: riscv32-unknown-elf
  enable-static-stack: false
  mcpu: generic-rv32
  mattr: "+c,+f"
  num-instrs: 100
  honor-target-abi: true

sections:
    - no:        1
      VMA:       0x500000
      SIZE:      0x100000
      LMA:       0x500000
      ACCESS:    rx
    - no:        2
      VMA:       0x600000
      SIZE:      0x700000
      LMA:       0x600000
      ACCESS:    rw
    - name:      stack
      VMA:       0x400000
      SIZE:      0x100000
      LMA:       0x400000
      ACCESS:    rw

histogram:
    - [SP_RELATIVE_INSTR, 1.0]
    - [ADDI, 1.0]

# X2: error: Incompatible options: When the stack pointer is redefined to 'reg::X2', generation of SP-relative instructions is not supported. Redefine it with `redefine-sp` option or remove SP-relative instructions from the histogram.
# X2-NOT: error: Incompatible options: When --honor-target-abi is enabled, generation of SP-relative instructions is not supported. You can provide `redefine-sp` option to make a generation process possible
# X2-NOT: error: Incompatible options: When the stack pointer is redefined to 'reg::X2', generation of SP-relative instructions is not supported. Redefine it with `redefine-sp` option or remove SP-relative instructions from the histogram.
# SP: error: Incompatible options: When the stack pointer is redefined to 'SP', generation of SP-relative instructions is not supported. Redefine it with `redefine-sp` option or remove SP-relative instructions from the histogram.
# SP-NOT: error: Incompatible options: When --honor-target-abi is enabled, generation of SP-relative instructions is not supported. You can provide `redefine-sp` option to make a generation process possible
# ANY: error: Incompatible options: When the stack pointer is redefined to 'any', generation of SP-relative instructions is not supported. Redefine it with `redefine-sp` option or remove SP-relative instructions from the histogram.
# ANY-NOT: error: Incompatible options: When --honor-target-abi is enabled, generation of SP-relative instructions is not supported. You can provide `redefine-sp` option to make a generation process possible
# ANY-NOT-SP: warning: (inconsistent-options) When using --honor-target-abi and --redefine-sp=any-not-SP options together, target ABI may not be preserved in case of traps: use these options in combination only for valid code generation
# X4: warning: (inconsistent-options) When using --honor-target-abi and --redefine-sp=reg::x4 options together, target ABI may not be preserved in case of traps: use these options in combination only for valid code generation
