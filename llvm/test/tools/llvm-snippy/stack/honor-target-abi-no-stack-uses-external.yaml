# RUN: llvm-snippy %s |& FileCheck %s

options:
  march: rv64gc
  mtriple: riscv64-linux-gnu
  honor-target-abi: true

sections:
  - name: text
    VMA: 0x1000
    LMA: 0x1000
    SIZE: 0x1000
    ACCESS: rx
  - name: data
    VMA: 0x2000
    LMA: 0x2000
    SIZE: 0x1000
    ACCESS: rw

histogram:
  - [ADD, 1.0]

# CHECK-NOT: error: LLVM ERROR: Cannot spill requested registers: no stack space allocated.
# CHECK: warning: (no-model-exec) Skipping snippet execution on the model: model was set to 'None'.
# CHECK: remark: (relocatable-generated) Snippet generator generated relocatable image
