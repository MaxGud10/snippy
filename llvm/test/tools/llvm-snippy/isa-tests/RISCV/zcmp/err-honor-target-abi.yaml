# RUN: not llvm-snippy %s -model-plugin None |& FileCheck %s

options:
  march: riscv64
  num-instrs: 1000
  honor-target-abi: on
  mattr: +zcmp

histogram:
  - [CM_PUSH, 1.0]

# CHECK: error: Incompatible options: When --honor-target-abi is enabled, generation of SP-relative instructions is not supported. You can provide `redefine-sp` option to make a generation process possible

