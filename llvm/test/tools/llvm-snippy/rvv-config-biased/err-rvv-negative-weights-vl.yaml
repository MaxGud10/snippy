# RUN: not llvm-snippy %s -march=riscv64-linux-gnu -mattr=+v \
# RUN: |& FileCheck %s

include:
- Inputs/err-rvv-negative-weights-vl.yaml

sections:
  - no:        1
    VMA:       0x80000000
    SIZE:      0x400000
    LMA:       0x80000000
    ACCESS:    rx
  - no:        2
    VMA:       0x80600000
    SIZE:      0x400000
    LMA:       0x80600000
    ACCESS:    rw
histogram:
    - [VADD_VV, 1.0]

# CHECK: VL/VM: weights must be non-negative!
