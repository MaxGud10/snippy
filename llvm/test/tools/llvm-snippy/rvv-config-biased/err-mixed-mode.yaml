# RUN: not llvm-snippy %s |& FileCheck %s

options:
  mtriple: riscv64-linux-gnu
  mattr: +v
  num-instrs: 10

include:
- Inputs/rvv-unit-all.yaml

sections:
  - name:      1
    VMA:       0x80000000
    SIZE:      0x400000
    LMA:       0x80000000
    ACCESS:    rx
  - name:      2
    VMA:       0x80600000
    SIZE:      0x400000
    LMA:       0x80600000
    ACCESS:    rw

histogram:
    - [VADD_VV, 1.0]
    - [VSETVL, 1.0]

# CHECK: error: It is forbidden to specify any mode-change-bias P other than "deduced" when VSET* instructions are present in histogram
