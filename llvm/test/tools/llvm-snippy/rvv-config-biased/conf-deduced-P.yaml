# REQUIRES: riscv-rvv

# RUN: llvm-snippy %s -model-plugin=None \
# RUN: |& FileCheck %s

options:
  mtriple: riscv64
  mattr: +v
  num-instrs: 100
  dump-mf: true

include:
  - ../rvv-config-histogram/Inputs/sections.yaml

riscv-vector-unit:
  mode-change-bias:
    P: deduced
  mode-distribution:
    VM:
      - [any_legal, 1.0]
    VL:
      - [any_legal, 1.0]
    VXRM:
      rnu: 1.0
    VTYPE:
      VMA:
        mu: 1.0
      VTA:
        tu: 1.0
      SEW:
        sew_32: 1.0
      LMUL:
        m1: 1.0

histogram:
      - [VSETIVLI, 1.0]
      - [VADD_VV, 1.0]

# COM: We expect 100 * (1.0 / 2.0) = 50 VSETIVLI instructions,
# COM: checking only 40 to be sure

# CHECK-COUNT-40: VSETIVLI
