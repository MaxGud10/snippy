options:
  mtriple: riscv64
  march: rv64imfdv
  num-instrs: 1000
  dump-mf: true
  verify-gen-histogram: true
  histogram-must-succeed: true

burst:
  mode: custom
  min-size: 4
  max-size: 4
  groupings:
    - [OPCODE]

histogram:
  - [OPCODE, 1.0]
  - [VSETIVLI, 1.0]
  - [MUL, 2.0]
  - [DIV, 1.0]
  - [ADD, 1.0]
  - [ADDI, 1.0]


# OPCODE-NOT: Opcode OPCODE is not supported in the burst mode
# OPCODE: {{((OPCODE.*[[:space:]].*){4})}}

# WARN: Opcode OPCODE is not supported in the burst mode
