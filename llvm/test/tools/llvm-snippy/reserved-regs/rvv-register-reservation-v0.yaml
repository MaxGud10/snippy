# COM: This test checks that if register v0 is reserved, it is equivalent to
#      using option --riscv-nomask-mode-for-rvv.

# RUN: llvm-snippy %s -model-plugin=None \
# RUN: |& FileCheck %s

options:
  mtriple: riscv64
  mattr: +v
  dump-mf: on
  rvv-init-mode: loads
  num-instrs: 10000

include:
  - Inputs/sections.yaml
  - Inputs/rvv-unit-all.yaml

histogram:
    - [VADD_VV, 1.0]

register-reservation:
  # Hard reserve
  - "V0": [RW]

# CHECK-NOT: v0
