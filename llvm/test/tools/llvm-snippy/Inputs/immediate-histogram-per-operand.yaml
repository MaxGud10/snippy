include:
  - sections.yaml

options:
  mtriple: riscv64-unknown-elf
  num-instrs: 100
  dump-mf: on
  mattr: +Zicsr,+f

histogram:
    - [CSRRWI, 1.0]

imm-hist:
  opcodes:
    - 'CSRRWI':
        operands:
          - - [0x2, 1.0] # First operand  (CSR)
          - - [0x0, 1.0] # Second operand (Value to write)
            - [0x1, 1.0]