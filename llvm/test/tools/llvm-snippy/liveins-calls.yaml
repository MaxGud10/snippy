# RUN: llvm-snippy %s -model-plugin None -dump-mir=- |& FileCheck %s

# COM: Check that we tracks the liveness and 'verify-mi' finishes without errors.

options:
  march: riscv64-unknown-elf
  num-instrs: 200
  init-regs-in-elf: true
  function-number: 20
  function-layers: 5
  verify-mi: true

sections:
  - name:      1
    VMA:       0x210000
    SIZE:      0x100000
    LMA:       0x210000
    ACCESS:    rx
  - name:      2
    VMA:       0x100000
    SIZE:      0x100000
    LMA:       0x100000
    ACCESS:    rw
  - name:      stack
    VMA:       0x400000
    SIZE:      0x100000
    LMA:       0x400000
    ACCESS:    rw

call-graph:
  entry-point: SnippyFunction
  function-list:
    - name: SnippyFunction
      callees:
        - myfunc
    - name: myfunc
      external: true

histogram:
    - [ADD, 1.0]
    - [SUB, 1.0]
    - [AND, 1.0]
    - [XOR, 1.0]
    - [JAL, 0.5]
    - [JALR, 0.5]

# COM: We check that SnippyFunction has tracksRegLiveness
# CHECK: name: SnippyFunction
# CHECK-NEXT: alignment:
# CHECK-NEXT: exposesReturnsTwice:
# CHECK-NEXT: legalized:
# CHECK-NEXT: regBankSelected:
# CHECK-NEXT: selected:
# CHECK-NEXT: failedISel:
# CHECK-NEXT: tracksRegLiveness: true
